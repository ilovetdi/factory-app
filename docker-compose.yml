version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: factory
    volumes:
      - db_data:/var/lib/postgresql/data

backend:
  image: node:18
  working_dir: /app
  volumes:
    - ./backend:/app
  command: sh -c "npm install && node server.js"
  ports:
    - "3000:3000"

frontend:
  image: node:18
  working_dir: /app
  volumes:
    - ./frontend:/app
  command: sh -c "npm install && npm run dev -- --host"
  ports:
    - "5173:5173"

volumes:
  db_data:
