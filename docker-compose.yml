version: "3.8"

services:

  db:
    image: postgres:15
    container_name: factory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    image: node:18
    container_name: factory-backend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: sh -c "npm install && node server.js"
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: factory
      JWT_SECRET: supersecret
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    image: node:18
    container_name: factory-frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data: