
version: "3.8"

services:
  db:
    image: postgres:15
    healthcheck:
    test: ["CMD-SHELL", "pg_isready -U admin"]
    interval: 5s
    timeout: 5s
    retries: 10
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: factory
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: factory
      JWT_SECRET: secret123
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - backend

volumes:
  db_data:
